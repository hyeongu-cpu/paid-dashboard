(function(){
  // === 자정 reset ===
  var nowUtcMs = Date.now();
  var kstMs    = nowUtcMs + 9 * 3600 * 1000;
  var today    = new Date(kstMs).toISOString().slice(0, 10);
  var KEY_DAY  = 'finda_dashboard_last_auth_day';
  var lastDay  = localStorage.getItem(KEY_DAY);
  if (lastDay && lastDay !== today) {
    Object.keys(localStorage).forEach(function(k){
      if (k.indexOf('staticrypt_') === 0) localStorage.removeItem(k);
    });
  }
  localStorage.setItem(KEY_DAY, today);

  // === Remember me 체크박스 기본 ON ===
  function checkRememberBox() {
    var box = document.getElementById('staticrypt-remember');
    if (box && !box.checked) box.checked = true;
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', checkRememberBox);
  } else {
    checkRememberBox();
  }
})();
